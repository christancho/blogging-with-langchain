services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/christancho/blogging-with-langchain-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/blogforge
      JWT_SECRET: ${JWT_SECRET}
      UI_PASSWORD: ${UI_PASSWORD}
      WEB_URL: ${WEB_URL}
      ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY}
      GHOST_API_KEY: ${GHOST_API_KEY}
      GHOST_API_URL: ${GHOST_API_URL}
      GHOST_AUTHOR_ID: ${GHOST_AUTHOR_ID}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      # Remote MCP server OAuth (required in production — the app fails closed
      # and refuses to start if any of these are unset while ENV=production).
      OAUTH_ISSUER: ${OAUTH_ISSUER}
      OAUTH_AUDIENCE: ${OAUTH_AUDIENCE}
      OAUTH_JWKS_URL: ${OAUTH_JWKS_URL}
      MCP_RESOURCE_URL: ${MCP_RESOURCE_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/christancho/blogging-with-langchain-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
