services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/blogforge
      JWT_SECRET: ${JWT_SECRET}
      UI_PASSWORD: ${UI_PASSWORD}
      WEB_URL: ${WEB_URL}
      ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      CLAUDE_TEMPERATURE: ${CLAUDE_TEMPERATURE}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY}
      GHOST_API_KEY: ${GHOST_API_KEY}
      GHOST_API_URL: ${GHOST_API_URL}
      GHOST_AUTHOR_ID: ${GHOST_AUTHOR_ID}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      API_URL: ${API_URL}
    depends_on:
      - api

volumes:
  postgres_data:
