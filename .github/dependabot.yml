version: 2
updates:
  # Python dependencies (root requirements.txt: agentic/ + api/)
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Next.js frontend
  - package-ecosystem: "npm"
    directory: "/web"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"

  # Base images in Dockerfiles
  - package-ecosystem: "docker"
    directory: "/api"
    target-branch: "dev"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/web"
    target-branch: "dev"
    schedule:
      interval: "weekly"
